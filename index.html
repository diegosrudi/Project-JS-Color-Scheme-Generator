<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="color-form" class="color-controls">
            <input type="color" id="color-picker" name="seedColor" value="#00adb5">
            
            <select id="scheme-mode" name="mode">
                <option value="monochrome">Monochrome</option>
                <option value="monochrome-dark">Monochrome-dark</option>
                <option value="monochrome-light">Monochrome-light</option>
                <option value="analogic">Analogic</option>
                <option value="complement">Complement</option>
                <option value="triad">Triad</option>
                <option value="quad">Quad</option>
            </select>
            
            <button type="submit" id="btn-get-scheme">Get color scheme</button>
        </form>

        <main id="palette-container" class="palette-container">
            <div class="color-column">
                <div class="color-block" style="background-color: #00adb5;"></div>
                <span class="color-hex">#00adb5</span>
            </div>
            <div class="color-column">
                <div class="color-block" style="background-color: #222831;"></div>
                <span class="color-hex">#222831</span>
            </div>
            <div class="color-column">
                <div class="color-block" style="background-color: #393e46;"></div>
                <span class="color-hex">#393e46</span>
            </div>
            <div class="color-column">
                <div class="color-block" style="background-color: #eeeeee;"></div>
                <span class="color-hex">#eeeeee</span>
            </div>
            <div class="color-column">
                <div class="color-block" style="background-color: #ff2e63;"></div>
                <span class="color-hex">#ff2e63</span>
            </div>
        </main>
    </div>

    <script src="index.js"></script>
</body>
